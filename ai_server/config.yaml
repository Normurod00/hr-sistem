# HR AI Server Configuration
# ============================

server:
  host: "0.0.0.0"
  port: 8095
  debug: false
  cors_origins:
    - "http://localhost"
    - "http://127.0.0.1"
    - "http://204.168.217.54"
    - "https://204.168.217.54"
    - "http://app"
    - "http://hr-app"
    - "http://hr-brb"
    - "http://localhost:8000"
    - "http://127.0.0.1:8000"
    - "*"

# LLM Configuration
llm:
  # Провайдер: local, ollama, openai
  provider: "local"

  # Локальная модель (рекомендуется для приватности)
  local:
    model_path: "models/mistral-7b-instruct-v0.2.Q4_K_M.gguf"
    model_type: "mistral"
    context_length: 4096
    max_tokens: 2048
    temperature: 0.3
    threads: 4
    gpu_layers: 0  # 0 для CPU, >0 для GPU

  # Ollama (альтернатива)
  ollama:
    host: "http://127.0.0.1:11434"
    model: "mistral"
    timeout: 120

  # OpenAI (fallback)
  openai:
    api_key: ""  # Из .env
    model: "gpt-4o-mini"
    max_tokens: 4096

# Обработка документов
documents:
  max_file_size_mb: 10
  allowed_extensions:
    - ".pdf"
    - ".docx"
    - ".doc"
    - ".txt"
    - ".rtf"
  temp_dir: "temp"

# HR-специфичные настройки
hr:
  # Веса для match score
  match_weights:
    must_have_skills: 0.5
    nice_to_have_skills: 0.3
    experience: 0.2

  # Минимальный score для shortlist
  min_shortlist_score: 60

  # Генерация отчётов
  generate:
    strengths: true
    weaknesses: true
    risks: true
    questions: true
    recommendation: true

# Логирование
logging:
  level: "INFO"
  file: "logs/ai_server.log"
  max_size_mb: 10
  backup_count: 5
