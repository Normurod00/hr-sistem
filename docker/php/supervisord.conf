[supervisord]
nodaemon=false
logfile=/dev/null
logfile_maxbytes=0

[program:queue-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /opt/hr-servis/artisan queue:work --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
numprocs=2
redirect_stderr=true
stdout_logfile=/opt/hr-servis/storage/logs/queue-worker.log
stopwaitsecs=30

[program:scheduler]
command=sh -c "while true; do php /opt/hr-servis/artisan schedule:run --verbose --no-interaction >> /opt/hr-servis/storage/logs/scheduler.log 2>&1; sleep 60; done"
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/dev/null
