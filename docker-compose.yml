version: "3.8"

services:
  # ── Laravel PHP-FPM ──
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    expose:
      - "9000"
    volumes:
      - ./storage:/var/www/html/storage
      - ./.env:/var/www/html/.env
      - app-public:/var/www/html/public
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - HR_AI_URL=http://ai:8095
    networks:
      - hr-net

  # ── Queue Worker + Scheduler ──
  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    command: supervisord -c /etc/supervisor/conf.d/supervisord.conf -n
    volumes:
      - ./storage:/var/www/html/storage
      - ./.env:/var/www/html/.env
    depends_on:
      - app
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - HR_AI_URL=http://ai:8095
    networks:
      - hr-net

  # ── AI Server (FastAPI) ──
  ai:
    build:
      context: .
      dockerfile: docker/ai/Dockerfile
    restart: unless-stopped
    expose:
      - "8095"
    volumes:
      - ./ai_server/config.yaml:/app/config.yaml
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8095/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - hr-net

  # ── PostgreSQL ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-hr_brb}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hr-net

  # ── Redis ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - hr-net

volumes:
  db-data:
  redis-data:
  app-public:

networks:
  hr-net:
    driver: bridge
